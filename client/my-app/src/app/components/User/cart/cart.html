<!-- Side Cart Overlay (Left Side) -->
     <p-toast position="top-center"></p-toast>

<div *ngIf="showCart"
     style="position: fixed; top: 0; left: 0; width: 320px; height: 100vh;
            background: linear-gradient(135deg, #fcd34d 0%, #fbbf24 100%);
            box-shadow: 4px 0 10px rgba(0,0,0,0.2); z-index: 1000;
            display: flex; flex-direction: column; padding: 1rem; gap: 1rem;">

    <!-- Header -->
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2 style="margin: 0; font-size: 1.5rem; color: #333;">Your Cart</h2>
        <button (click)="onClose()"
                style="border: none; background: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
    </div>

    <!-- Items List -->
    <div *ngIf="cartItems.length === 0"
         style="flex: 1; display: flex; justify-content: center; align-items: center; color: #444;">
        Your cart is empty
    </div>

    <div *ngFor="let item of cartItems" 
         style="display: flex; flex-direction: column; gap: 0.25rem; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 0.5rem;">



        <!-- Quantity controls -->
        <div style="display: flex; align-items: center; gap: 0.5rem;">
            <button (click)="decreaseItemAmount(item.giftId)"
                    style="width: 25px; height: 25px; border: none; background: #f59e0b; color: white; border-radius: 0.25rem; cursor: pointer;">
                -
            </button>
            <span>{{ item.quantity }}</span>
            <button (click)="increaseQuantity(item.giftId)"
                    style="width: 25px; height: 25px; border: none; background: #f59e0b; color: white; border-radius: 0.25rem; cursor: pointer;">
                +
            </button>

            <span style="margin-left: auto; font-weight: bold;">₪{{ item.price }}</span>
        </div>

        <!-- Total per item -->
        <div style="text-align: right; font-size: 0.85rem; color: #444;">
            Total: ₪{{ item.totalPrice || (item.quantity * item.price) }}
        </div>
        <!-- Info row -->
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: bold; color: #333;">{{ item.giftName }}</span>
            <button (click)="removeFromCart(item.giftId)" [disabled]="isDeleting"
                    style="border: none; background: #ef4444; color: white; border-radius: 0.25rem; padding: 0.25rem 0.5rem; cursor: pointer;">
                🗑️
            </button>
        </div>
    </div>

    <!-- Footer / Total -->
    <div style="margin-top: auto; display: flex; justify-content: space-between; align-items: center; font-weight: bold; color: #333; font-size: 1.1rem;">
        <span>Total:</span>
        <span>₪{{getCartTotal()}}</span>
    </div>

    <!-- Checkout Button -->
    <button style="margin-top: 0.5rem; width: 100%; background: #f59e0b; color: white; border: none; border-radius: 0.5rem; padding: 0.5rem; font-weight: bold; cursor: pointer;"
    (click)="checkout()"
    [disabled]="!cartItems || cartItems.length === 0">
        Checkout
    </button>

</div>
